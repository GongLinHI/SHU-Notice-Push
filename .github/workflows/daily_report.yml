name: Daily Report

on:
  schedule:
    - cron: '0 23 * * *' # 每天 UTC 23:00 = 北京时间 7:00
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    environment: Ubuntu-Python

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Python script
        id: run_python_script
        run: |
          python -m src.spider.Spider
        working-directory: ${{ github.workspace }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
        continue-on-error: false  # 如果 Python 脚本失败，则中止后续步骤

      - name: Get Beijing Time
        id: date
        if: success()  # 只有在 Python 脚本成功时才执行
        run: |
          echo "date=$(date -u -d '8 hours' +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Check if today's markdown file exists
        id: check_file
        if: success()  # 只有在 Python 脚本成功时才执行
        run: |
          if [ -f "resources/results/${{ steps.date.outputs.date }}.md" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "::warning file=resources/results::未找到今日的 Markdown 文件，跳过后续步骤。"
          fi

      - name: Render Markdown to HTML
        if: steps.check_file.outputs.found == 'true' && success()  # 只有在 Python 脚本和检查文件都成功时才执行
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          mkdir -p resources/results/html
          pandoc resources/results/${{ steps.date.outputs.date }}.md \
          -f markdown -t html -s \
          --metadata title="Daily Report - ${{ steps.date.outputs.date }}" \
          --css https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css \
          -o resources/results/html/${{ steps.date.outputs.date }}.html

      - name: Send Email
        if: steps.check_file.outputs.found == 'true' && success()  # 只有在 Python 脚本和检查文件都成功时才执行
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: ${{ secrets.MAIL_SERVER_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '每日报告 - ${{ steps.date.outputs.date }}'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: file://resources/results/html/${{ steps.date.outputs.date }}.html

      - name: Configure Git
        if: success()  # 只有在 Python 脚本和所有前面的步骤成功时才执行
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit and Push updated files (excluding html/)
        if: success()  # 只有在 Python 脚本和所有前面的步骤成功时才执行
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add resources/notice_records.csv
          git add resources/results
          git restore --staged resources/results/html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update notice_records.csv and results (excluding html) [bot commit]"
            git push origin HEAD:${{ github.ref }}
