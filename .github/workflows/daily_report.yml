name: Daily Report

on:
  schedule:
    - cron: '0 17 * * *' # 每天 UTC 17:00 执行，即北京时间 1:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    environment: Ubuntu-Python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get Beijing Time
        id: date
        run: echo "date=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Run notice pipeline
        id: run_python_script
        run: |
          set +e
          output=$(python -m src.notice_push --profile daily --date "${{ steps.date.outputs.date }}" 2>&1)
          exit_code=$?
          echo "$output"
          printf '%s\n' "$output" > "$RUNNER_TEMP/notice_pipeline.log"

          new_count=$(echo "$output" | awk -F= '/^new_count=/{print $2}' | tail -n1)
          summarized_count=$(echo "$output" | awk -F= '/^summarized_count=/{print $2}' | tail -n1)
          failed_count=$(echo "$output" | awk -F= '/^failed_count=/{print $2}' | tail -n1)
          source_error_count=$(echo "$output" | awk -F= '/^source_error_count=/{print $2}' | tail -n1)

          if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 1 ]; then
            echo "::error::Notice pipeline exited with unexpected code $exit_code."
            exit_code=2
          elif [ "$exit_code" -eq 1 ] && ! echo "$output" | grep -q '^new_count='; then
            echo "::error::Notice pipeline failed before reporting counts."
            exit_code=2
          fi

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "new_count=${new_count:-0}" >> "$GITHUB_OUTPUT"
          echo "summarized_count=${summarized_count:-0}" >> "$GITHUB_OUTPUT"
          echo "failed_count=${failed_count:-0}" >> "$GITHUB_OUTPUT"
          echo "source_error_count=${source_error_count:-0}" >> "$GITHUB_OUTPUT"
          echo "log_path=$RUNNER_TEMP/notice_pipeline.log" >> "$GITHUB_OUTPUT"
          exit 0
        working-directory: ${{ github.workspace }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-chat' }}
          PROMPT_NAME: ${{ vars.PROMPT_NAME || 'notice_summary_v1' }}
          SUMMARY_MAX_WORKERS: ${{ vars.SUMMARY_MAX_WORKERS || '3' }}
          SOURCE_SHU_OFFICIAL_ENABLED: ${{ vars.SOURCE_SHU_OFFICIAL_ENABLED || 'true' }}
          SOURCE_MANAGEMENT_SCHOOL_ENABLED: ${{ vars.SOURCE_MANAGEMENT_SCHOOL_ENABLED || 'true' }}
          SOURCE_GRADUATE_SCHOOL_ENABLED: ${{ vars.SOURCE_GRADUATE_SCHOOL_ENABLED || 'true' }}

      - name: Check if there are new notices
        id: check_notices
        run: |
          if [ "${{ steps.run_python_script.outputs.exit_code }}" = "0" ]; then
            echo "has_new_notices=true" >> "$GITHUB_OUTPUT"
            echo "Found reportable notices or failures."
          else
            echo "has_new_notices=false" >> "$GITHUB_OUTPUT"
            echo "No reportable new notices found today; source_error_count=${{ steps.run_python_script.outputs.source_error_count }}."
          fi

      - name: Prepare operational alert email
        id: prepare_alert
        if: steps.run_python_script.outputs.source_error_count != '0' || steps.run_python_script.outputs.exit_code == '2'
        run: |
          alert_file="$RUNNER_TEMP/notice_alert.html"
          {
            echo '<!doctype html><html><body style="font-family:Arial,sans-serif;line-height:1.6;color:#1f2937;">'
            echo '<h2>上海大学通知推送运行异常</h2>'
            echo '<p>本邮件只表示爬虫运行或源站访问异常，不代表今日存在新通知。</p>'
            echo '<ul>'
            echo '<li>报告日期: ${{ steps.date.outputs.date }}</li>'
            echo '<li>pipeline_exit_code: ${{ steps.run_python_script.outputs.exit_code }}</li>'
            echo '<li>source_error_count: ${{ steps.run_python_script.outputs.source_error_count }}</li>'
            echo '<li>failed_count: ${{ steps.run_python_script.outputs.failed_count }}</li>'
            echo '<li>workflow: <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">查看 GitHub Actions 日志</a></li>'
            echo '</ul>'
            echo '<h3>Pipeline 输出</h3>'
            echo '<pre style="white-space:pre-wrap;background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:12px;">'
            sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' "${{ steps.run_python_script.outputs.log_path }}"
            echo '</pre>'
            echo '</body></html>'
          } > "$alert_file"
          echo "alert_path=$alert_file" >> "$GITHUB_OUTPUT"

      - name: Send operational alert email
        if: steps.run_python_script.outputs.source_error_count != '0' || steps.run_python_script.outputs.exit_code == '2'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: ${{ secrets.MAIL_SERVER_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '上海大学通知推送运行异常 - ${{ steps.date.outputs.date }} - 源站异常 ${{ steps.run_python_script.outputs.source_error_count }} 个'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: file://${{ steps.prepare_alert.outputs.alert_path }}

      - name: Fail if notice pipeline errored
        if: steps.run_python_script.outputs.exit_code == '2'
        run: |
          echo "::error::Python 脚本执行失败，exit_code=${{ steps.run_python_script.outputs.exit_code }}。"
          exit 1

      - name: Check if today's markdown file exists
        id: check_file
        if: steps.check_notices.outputs.has_new_notices == 'true'
        run: |
          if [ -f "resources/results/${{ steps.date.outputs.date }}.md" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning file=resources/results::未找到今日的 Markdown 文件，跳过后续步骤。"
          fi

      - name: Render Markdown to HTML
        if: steps.check_file.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          mkdir -p resources/results/html
          pandoc \
            resources/results/${{ steps.date.outputs.date }}.md \
            -f markdown -t html5 --standalone \
            --template=resources/templates/daily_report.html \
            --metadata=title:上海大学通知汇总 \
            --metadata=report_date:${{ steps.date.outputs.date }} \
            --metadata=new_count:${{ steps.run_python_script.outputs.new_count }} \
            --metadata=summarized_count:${{ steps.run_python_script.outputs.summarized_count }} \
            --metadata=failed_count:${{ steps.run_python_script.outputs.failed_count }} \
            -o resources/results/html/${{ steps.date.outputs.date }}.html

      - name: Send Email
        if: steps.check_file.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: ${{ secrets.MAIL_SERVER_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '上海大学通知汇总 - ${{ steps.date.outputs.date }} - 新增 ${{ steps.run_python_script.outputs.new_count }} 条'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: file://resources/results/html/${{ steps.date.outputs.date }}.html

      - name: Configure Git
        if: steps.check_file.outputs.found == 'true' || steps.run_python_script.outputs.exit_code == '1'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit and Push updated files
        if: steps.check_file.outputs.found == 'true' || steps.run_python_script.outputs.exit_code == '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.check_file.outputs.found }}" = "true" ]; then
            git add resources/results
          fi
          if [ -f resources/notice_state.sqlite3 ]; then
            git add resources/notice_state.sqlite3
          fi
          git restore --staged resources/results/html || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update notice state and daily report [bot commit]"
            git push origin HEAD:${{ github.ref }}
          fi
