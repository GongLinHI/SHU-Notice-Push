name: Daily Report

on:
  schedule:
    - cron: '0 17 * * *' # 每天 UTC 17:00 执行，即北京时间 1:00
  workflow_dispatch:

concurrency:
  group: notice-daily-report
  cancel-in-progress: false

permissions:
  contents: write

env:
  FAILURE_SNAPSHOT_BRANCH: bot/failure-snapshots
  FAILURE_SNAPSHOT_RETENTION_DAYS: "90"
  FAILURE_SNAPSHOT_MAX_SCAN_ENTRIES: "200"
  FAILURE_SNAPSHOT_ARTIFACT_RETENTION_DAYS: "30"

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    environment: Ubuntu-Python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get Beijing Time
        id: date
        run: echo "date=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Backup SQLite state
        id: backup_state
        run: |
          if python -m scripts.workflow.backup_sqlite \
            --source resources/notice_state.sqlite3 \
            --destination "$RUNNER_TEMP/notice_state_before_run.sqlite3"; then
            echo "backup_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "backup_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run notice pipeline
        id: run_python_script
        run: |
          set +e
          python -m notice_push --profile daily --date "${{ steps.date.outputs.date }}" \
            > "$RUNNER_TEMP/notice_pipeline.log" 2>&1
          raw_exit_code=$?
          cat "$RUNNER_TEMP/notice_pipeline.log"
          echo "raw_exit_code=$raw_exit_code" >> "$GITHUB_OUTPUT"
          echo "log_path=$RUNNER_TEMP/notice_pipeline.log" >> "$GITHUB_OUTPUT"
          exit 0
        working-directory: ${{ github.workspace }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_MODEL: ${{ secrets.KIMI_MODEL || 'kimi-k2.7-code' }}

      - name: Evaluate initial publication
        id: initial_publication
        if: always()
        run: |
          if ! python -m scripts.workflow.evaluate_publication \
            --pipeline-log "${{ steps.run_python_script.outputs.log_path }}" \
            --raw-exit-code "${{ steps.run_python_script.outputs.raw_exit_code }}" \
            --workspace "$GITHUB_WORKSPACE" \
            --report-date "${{ steps.date.outputs.date }}" \
            --run-id "${{ github.run_id }}" \
            --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --trigger "${{ github.event_name }}" \
            --git-sha "${{ github.sha }}" \
            --failure-snapshot-branch "$FAILURE_SNAPSHOT_BRANCH" \
            --candidate-publication-json "$RUNNER_TEMP/candidate-publication.json" \
            --github-output "$GITHUB_OUTPUT"; then
            python -m scripts.workflow.write_blocked_publication_fallback \
              --report-date "${{ steps.date.outputs.date }}" \
              --run-id "${{ github.run_id }}" \
              --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --trigger "${{ github.event_name }}" \
              --git-sha "${{ github.sha }}" \
              --blocker publication_evaluator_failed \
              --failure-snapshot-branch "$FAILURE_SNAPSHOT_BRANCH" \
              --output-prefix initial_ \
              --publication-json "$RUNNER_TEMP/candidate-publication.json" \
              --github-output "$GITHUB_OUTPUT"
          fi

      - name: Upload SQLite backup
        if: always() && steps.backup_state.outputs.backup_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: notice-state-before-run-${{ steps.date.outputs.date }}
          path: ${{ runner.temp }}/notice_state_before_run.sqlite3
          retention-days: 14

      - name: Upload run summary JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notice-run-summary-${{ steps.date.outputs.date }}
          path: resources/results/json/${{ steps.date.outputs.date }}.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Render Markdown to HTML
        id: render_html
        if: steps.initial_publication.outputs.initial_publication_status == 'published'
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          mkdir -p resources/results/html
          pandoc \
            "${{ steps.initial_publication.outputs.initial_report_path }}" \
            -f markdown -t html5 --standalone \
            --template=resources/templates/daily_report.html \
            --metadata=title:上海大学通知汇总 \
            --metadata=report_date:${{ steps.date.outputs.date }} \
            --metadata=new_count:${{ steps.initial_publication.outputs.initial_new_count }} \
            --metadata=updated_count:${{ steps.initial_publication.outputs.initial_updated_count }} \
            --metadata=retried_count:${{ steps.initial_publication.outputs.initial_retried_count }} \
            --metadata=summarized_count:${{ steps.initial_publication.outputs.initial_summarized_count }} \
            --metadata=failed_count:${{ steps.initial_publication.outputs.initial_failed_count }} \
            --metadata=manual_review_count:${{ steps.initial_publication.outputs.initial_manual_review_count }} \
            -o resources/results/html/${{ steps.date.outputs.date }}.html

      - name: Publish formal master state
        id: publish_master
        if: steps.initial_publication.outputs.initial_publication_status == 'no_report' || (steps.initial_publication.outputs.initial_publication_status == 'published' && steps.render_html.outcome == 'success')
        continue-on-error: true
        run: |
          python -m scripts.workflow.publish_master \
            --repository "$GITHUB_WORKSPACE" \
            --branch "$GITHUB_REF_NAME" \
            --candidate-publication-json "$RUNNER_TEMP/candidate-publication.json" \
            --result-json "$RUNNER_TEMP/master-publication.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Finalize publication
        id: publication
        if: always()
        env:
          RENDER_HTML_STATUS: ${{ steps.render_html.outcome }}
          MASTER_PUBLISH_STATUS: ${{ steps.publish_master.outputs.status }}
          MASTER_STATE_UPDATED: ${{ steps.publish_master.outputs.master_state_updated }}
          MASTER_PUBLISH_ERROR: ${{ steps.publish_master.outputs.error }}
        run: |
          if ! python -m scripts.workflow.finalize_publication \
            --candidate-publication-json "$RUNNER_TEMP/candidate-publication.json" \
            --publication-json "$RUNNER_TEMP/publication.json" \
            --report-date "${{ steps.date.outputs.date }}" \
            --run-id "${{ github.run_id }}" \
            --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --trigger "${{ github.event_name }}" \
            --git-sha "${{ github.sha }}" \
            --failure-snapshot-branch "$FAILURE_SNAPSHOT_BRANCH" \
            --raw-exit-code "${{ steps.run_python_script.outputs.raw_exit_code }}" \
            --render-html-status "${RENDER_HTML_STATUS:-skipped}" \
            --master-publish-status "${MASTER_PUBLISH_STATUS:-failed}" \
            --master-state-updated "${MASTER_STATE_UPDATED:-false}" \
            --master-publish-error "${MASTER_PUBLISH_ERROR:-}" \
            --github-output "$GITHUB_OUTPUT" \
            || ! python -m scripts.workflow.validate_publication_result \
              --publication-json "$RUNNER_TEMP/publication.json" \
              --github-output "$GITHUB_OUTPUT"; then
            python -m scripts.workflow.write_blocked_publication_fallback \
              --report-date "${{ steps.date.outputs.date }}" \
              --run-id "${{ github.run_id }}" \
              --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --trigger "${{ github.event_name }}" \
              --git-sha "${{ github.sha }}" \
              --blocker publication_finalizer_failed \
              --master-state-updated "${MASTER_STATE_UPDATED:-false}" \
              --failure-snapshot-branch "$FAILURE_SNAPSHOT_BRANCH" \
              --publication-json "$RUNNER_TEMP/publication.json" \
              --github-output "$GITHUB_OUTPUT"
          fi

      - name: Send daily report email
        id: send_report_email
        if: steps.publication.outputs.publication_status == 'published'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: ${{ secrets.MAIL_SERVER_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '上海大学通知汇总 - ${{ steps.date.outputs.date }} - 新增 ${{ steps.publication.outputs.new_count }} 条'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: file://resources/results/html/${{ steps.date.outputs.date }}.html

      - name: Report daily email delivery failure
        if: always() && steps.publication.outputs.publication_status == 'published' && steps.send_report_email.outcome == 'failure'
        run: echo "::error::正式数据已发布到 master，但日报邮件投递失败。"

      - name: Sanitize failure pipeline log
        if: always() && steps.publication.outputs.publication_status == 'blocked'
        continue-on-error: true
        run: |
          python -m scripts.workflow.sanitize_pipeline_log \
            --source "${{ steps.run_python_script.outputs.log_path }}" \
            --destination "$RUNNER_TEMP/sanitized-notice_pipeline.log" \
            --secret-env DEEPSEEK_API_KEY \
            --secret-env KIMI_API_KEY \
            --secret-env MAIL_PASSWORD
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

      - name: Build failure snapshot
        id: build_failure_snapshot
        if: always() && steps.publication.outputs.publication_status == 'blocked'
        continue-on-error: true
        run: |
          mkdir -p "$RUNNER_TEMP/failure-snapshot"
          python -m scripts.workflow.build_failure_snapshot \
            --snapshot-root "$RUNNER_TEMP/failure-snapshot" \
            --report-date "${{ steps.date.outputs.date }}" \
            --run-id "${{ github.run_id }}" \
            --pipeline-log "${{ steps.run_python_script.outputs.log_path }}" \
            --publication-json "$RUNNER_TEMP/publication.json" \
            --workspace "$GITHUB_WORKSPACE" \
            --state-path resources/notice_state.sqlite3 \
            --run-summary-path "${{ steps.publication.outputs.run_summary_path }}" \
            --partial-report-path "${{ steps.publication.outputs.report_path }}" \
            --secret-env DEEPSEEK_API_KEY \
            --secret-env KIMI_API_KEY \
            --secret-env MAIL_PASSWORD \
            --github-output "$GITHUB_OUTPUT"
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

      - name: Upload failure snapshot
        if: always() && steps.publication.outputs.publication_status == 'blocked'
        uses: actions/upload-artifact@v4
        with:
          name: notice-failure-snapshot-${{ steps.date.outputs.date }}-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/failure-snapshot
            ${{ runner.temp }}/publication.json
            ${{ runner.temp }}/sanitized-notice_pipeline.log
          if-no-files-found: warn
          retention-days: ${{ fromJSON(env.FAILURE_SNAPSHOT_ARTIFACT_RETENTION_DAYS) }}

      - name: Checkout failure snapshot branch workspace
        id: checkout_failure_snapshot
        if: always() && steps.publication.outputs.publication_status == 'blocked'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          path: .failure-snapshot-repo
          fetch-depth: 0

      - name: Push failure snapshot
        id: push_failure_snapshot
        if: always() && steps.publication.outputs.publication_status == 'blocked' && steps.build_failure_snapshot.outcome == 'success' && steps.checkout_failure_snapshot.outcome == 'success'
        continue-on-error: true
        run: |
          python -m scripts.workflow.publish_failure_snapshot \
            --checkout "$GITHUB_WORKSPACE/.failure-snapshot-repo" \
            --source-snapshot "${{ steps.build_failure_snapshot.outputs.snapshot_directory }}" \
            --branch "$FAILURE_SNAPSHOT_BRANCH" \
            --report-date "${{ steps.date.outputs.date }}" \
            --run-id "${{ github.run_id }}" \
            --retention-days "$FAILURE_SNAPSHOT_RETENTION_DAYS" \
            --max-scan-entries "$FAILURE_SNAPSHOT_MAX_SCAN_ENTRIES" \
            --pipeline-exit-code "${{ steps.publication.outputs.pipeline_exit_code }}" \
            --source-error-count "${{ steps.publication.outputs.source_error_count }}" \
            --audit-error-count "${{ steps.publication.outputs.audit_error_count }}" \
            --artifact-name "${{ steps.publication.outputs.artifact_name }}" \
            --publication-blockers "${{ steps.publication.outputs.publication_blockers }}" \
            --result-json "$RUNNER_TEMP/failure-snapshot-publish.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Prepare operational alert email
        id: prepare_alert
        if: always() && steps.publication.outputs.publication_status == 'blocked'
        run: |
          snapshot_directory="${{ steps.build_failure_snapshot.outputs.snapshot_directory }}"
          snapshot_status="${{ steps.push_failure_snapshot.outputs.status }}"
          python -m scripts.workflow.render_failure_alert \
            --snapshot-directory "$snapshot_directory" \
            --publication-json "$RUNNER_TEMP/publication.json" \
            --run-summary-path "$GITHUB_WORKSPACE/${{ steps.publication.outputs.run_summary_path }}" \
            --snapshot-push-status "${snapshot_status:-failed}" \
            --output "$RUNNER_TEMP/notice_alert.html"
          echo "alert_path=$RUNNER_TEMP/notice_alert.html" >> "$GITHUB_OUTPUT"

      - name: Send operational alert email
        if: always() && steps.publication.outputs.publication_status == 'blocked'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: ${{ secrets.MAIL_SERVER_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '上海大学通知推送运行异常 - ${{ steps.date.outputs.date }} - 源站异常 ${{ steps.publication.outputs.source_error_count }} 个 - 巡检异常 ${{ steps.publication.outputs.audit_error_count }} 个'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: file://${{ steps.prepare_alert.outputs.alert_path }}

      - name: Fail blocked publication
        if: always() && steps.publication.outputs.publication_status == 'blocked'
        run: |
          if [[ "${{ steps.publication.outputs.master_state_updated }}" == "true" ]]; then
            echo "::error::master 正式状态已更新，但后续发布收尾失败。阻断原因: ${{ steps.publication.outputs.publication_blockers }}"
          else
            echo "::error::日报未发布；master 正式状态未更新。阻断原因: ${{ steps.publication.outputs.publication_blockers }}"
          fi
          exit 1
