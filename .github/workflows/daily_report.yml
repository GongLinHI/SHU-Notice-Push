name: Daily Report

on:
  schedule:
    - cron: '0 23 * * *' # 每天 UTC 23:00 = 北京时间 7:00
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    environment: Ubuntu-Python

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        continue-on-error: true
      - name: Warn on checkout failure
        if: steps.checkout.outcome == 'failure'
        run: echo "::warning::Checkout 代码失败，跳过后续步骤。"

      - name: Setup Python
        continue-on-error: true
        run: |
          if ! actions/setup-python --version 3.12; then
            echo "::warning ::Setup Python 失败，跳过后续步骤。"
            exit 1
          fi

      - name: Install dependencies
        continue-on-error: true
        run: |
          if ! pip install -r requirements.txt; then
            echo "::warning file=requirements.txt::依赖安装失败，跳过后续步骤。"
            exit 1
          fi

      - name: Run Python script
        id: run_python_script
        if: success()
        run: |
          python -m src.spider.Spider
        working-directory: ${{ github.workspace }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}

      - name: Warning if Python script failed
        if: steps.run_python_script.outcome == 'failure'
        run: echo "::warning ::Python 脚本执行失败，整个任务标记为失败。"

      - name: Get Beijing Time
        id: date
        if: success()
        run: |
          echo "date=$(date -u -d '8 hours' +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Check if today's markdown file exists
        id: check_file
        if: success()
        run: |
          if [ -f "${{ github.workspace }}/resources/results/${{ steps.date.outputs.date }}.md" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "::warning file=resources/results::未找到今日的 Markdown 文件，跳过后续步骤。"
            exit 0
          fi

      - name: Render Markdown to HTML
        if: success() && steps.check_file.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          mkdir -p resources/results/html
          pandoc \
            resources/results/${{ steps.date.outputs.date }}.md \
            -f markdown \
            -t html \
            -s \
            --metadata "title=Daily Report - ${{ steps.date.outputs.date }}" \
            --include-in-header <(cat <<'EOF'
              <link rel="stylesheet"
                    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css"
                    media="(prefers-color-scheme: light)">
              <link rel="stylesheet"
                    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css"
                    media="(prefers-color-scheme: dark)">
              <style>
                /* 保证背景透明，让外层背景色透出来 */
                body {
                  background-color: transparent;
                }
                /* 容器调整 */
                .markdown-body {
                  box-sizing: border-box;
                  min-width: 200px;
                  max-width: 980px;
                  margin: 2rem auto;
                  padding: 0 1rem;
                }
              </style>
              EOF
              ) \
            --include-before-body '<article class="markdown-body">' \
            --include-after-body '</article>' \
            -o resources/results/html/${{ steps.date.outputs.date }}.html

      - name: Send Email
        if: success() && steps.check_file.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: ${{ secrets.MAIL_SERVER_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '每日报告 - ${{ steps.date.outputs.date }}'
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: file://resources/results/html/${{ steps.date.outputs.date }}.html

      - name: Configure Git
        if: success() && steps.check_file.outputs.found == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit and Push updated files (excluding html/)
        if: success() && steps.check_file.outputs.found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add resources/notice_records.csv
          git add resources/results
          git restore --staged resources/results/html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update notice_records.csv and results (excluding html) [bot commit]"
            git push origin HEAD:${{ github.ref }}
          fi
