name: CI

on:
  push:
    paths-ignore:
      - resources/notice_state.sqlite3
      - resources/results/**
  pull_request:
    paths-ignore:
      - resources/notice_state.sqlite3
      - resources/results/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify dependency consistency
        run: python -m pip check

      - name: Compile Python modules
        run: python -m compileall -q notice_push scripts

      - name: Run configuration doctor
        run: python -m notice_push --doctor --state-path "$RUNNER_TEMP/ci-state.sqlite3"

      - name: Prepare pytest temp directory
        run: mkdir -p .tmp

      - name: Run test suite
        run: pytest -q

      - name: Check whitespace errors
        run: git diff --check
