name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m notice_push --doctor --state-path "$RUNNER_TEMP/ci-state.sqlite3"
      - name: Prepare pytest temp directory
        run: mkdir -p .tmp
      - run: pytest tests/notice_push/test_cli.py tests/notice_push/test_sources.py -q
      - run: pytest -q
      - run: python -m compileall -q notice_push
