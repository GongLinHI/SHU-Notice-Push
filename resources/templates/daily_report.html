<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SHU 通知汇总</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #152033;
      --muted: #5f6b7a;
      --line: #d9e1ea;
      --accent: #1d4ed8;
      --accent-soft: #e8eefc;
      --warn: #b45309;
      --warn-soft: #fff4df;
      --good: #047857;
      --good-soft: #e6f7f0;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.65;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .hero {
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 32px rgba(17, 24, 39, 0.06);
      margin-bottom: 20px;
    }
    .title {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      white-space: nowrap;
    }
    .badge strong {
      font-weight: 600;
    }
    .content {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 26px 22px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.04);
    }
    .content h2 {
      margin: 28px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
      font-size: 22px;
      line-height: 1.25;
    }
    .content h3 {
      margin: 22px 0 10px;
      font-size: 18px;
    }
    .content p,
    .content li,
    .content blockquote {
      font-size: 15px;
    }
    .content ul,
    .content ol {
      padding-left: 20px;
      margin: 12px 0;
    }
    .content li + li {
      margin-top: 6px;
    }
    .content a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-word;
    }
    .content a:hover {
      text-decoration: underline;
    }
    .content strong {
      font-weight: 600;
    }
    .content blockquote {
      margin: 14px 0;
      padding: 12px 14px;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      color: #1f2937;
      border-radius: 0 10px 10px 0;
    }
    .content code {
      padding: 0.12em 0.35em;
      border-radius: 6px;
      background: #f1f5f9;
      font-size: 0.95em;
    }
    .content pre {
      overflow-x: auto;
      padding: 14px 16px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.55;
    }
    .content pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }
    .content hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 26px 0;
    }
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 14px;
    }
    .content th,
    .content td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      vertical-align: top;
      text-align: left;
    }
    .content th {
      background: #f8fafc;
    }
    .content img {
      max-width: 100%;
      height: auto;
    }
    @media (max-width: 640px) {
      .wrap { padding: 12px; }
      .hero, .content { border-radius: 14px; }
      .hero, .content { padding: 18px 16px; }
      .title { font-size: 22px; }
      .content h2 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1 class="title">SHU 通知汇总</h1>
      <div class="meta-row">
        <span class="badge"><strong>日期</strong> <span>$report_date$</span></span>
        <span class="badge"><strong>新增</strong> <span>$new_count$</span></span>
        <span class="badge"><strong>重试</strong> <span>$retried_count$</span></span>
        <span class="badge"><strong>成功</strong> <span>$summarized_count$</span></span>
        <span class="badge"><strong>复核</strong> <span>$manual_review_count$</span></span>
      </div>
    </section>
    <main class="content">
$body$
    </main>
  </div>
</body>
</html>
